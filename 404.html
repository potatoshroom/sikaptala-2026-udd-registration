<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SIKAPTALA 2026</title>
    <!--
      GitHub Pages SPA redirect hack.
      When GitHub serves a 404 for a deep link (e.g. /register), this page
      redirects the browser back to index.html with the path encoded in the
      query string, where the app reads it and restores the correct route.
      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentCount = 1; // must match the number of path segments in your repo name
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
